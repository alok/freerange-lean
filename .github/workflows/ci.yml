name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Build, test, and check declarations
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: --wfail
          test: true
          leanchecker: true

      - name: Run the self-checking examples
        run: lake exe freerange

      - name: Lint the public library
        run: lake lint FreeRange --lint-only=linter.all

      - name: Reject proof placeholders and custom axioms
        run: |
          if rg -n '\b(sorry|admit|axiom|unsafe)\b' --glob '*.lean' .; then
            echo 'Lean source contains a forbidden proof placeholder, custom axiom, or unsafe declaration.'
            exit 1
          fi

      - name: Audit public theorem axioms
        run: lake build +Test.Axioms --wfail
